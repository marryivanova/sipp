<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новая заявка с сайта</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7fb;">

    <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f4f7fb; padding: 40px 20px;">
        <tr>
            <td align="center">
                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); overflow: hidden;">

                    <tr>
                        <td style="background: linear-gradient(135deg, #4A90E2, #357ABD); padding: 30px 30px 20px 30px; text-align: center;">
                            <h1 style="margin: 0; font-size: 24px; font-weight: 600; color: #ffffff; letter-spacing: 0.5px;">
                                📬 Новая заявка с сайта
                            </h1>
                            <p style="margin: 6px 0 0 0; color: rgba(255,255,255,0.85); font-size: 14px;">
                                Заполнена контактная форма
                            </p>
                        </td>
                    </tr>

                    <!-- Тело письма -->
                    <tr>
                        <td style="padding: 30px 30px 20px 30px; background: #ffffff;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%" style="font-size: 15px; line-height: 1.6; color: #2d3748;">

                                <!-- Имя -->
                                <tr>
                                    <td style="padding: 12px 0 4px 0; font-weight: 600; color: #4A5568; border-bottom: 1px solid #EDF2F7;">
                                        👤 Имя
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 6px 0 16px 0; color: #1A202C; border-bottom: 1px solid #EDF2F7;">
                                        {{ name }}
                                    </td>
                                </tr>

                                <!-- Email -->
                                <tr>
                                    <td style="padding: 12px 0 4px 0; font-weight: 600; color: #4A5568; border-bottom: 1px solid #EDF2F7;">
                                        ✉️ Email
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 6px 0 16px 0; color: #1A202C; border-bottom: 1px solid #EDF2F7;">
                                        <a href="mailto:{{ email }}" style="color: #4A90E2; text-decoration: none; font-weight: 500;">
                                            {{ email }}
                                        </a>
                                    </td>
                                </tr>

                                <!-- Телефон -->
                                <tr>
                                    <td style="padding: 12px 0 4px 0; font-weight: 600; color: #4A5568; border-bottom: 1px solid #EDF2F7;">
                                        📞 Телефон
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 6px 0 16px 0; color: #1A202C; border-bottom: 1px solid #EDF2F7;">
                                        <a href="tel:{{ phone }}" style="color: #2d3748; text-decoration: none; font-weight: 500;">
                                            {{ phone }}
                                        </a>
                                    </td>
                                </tr>

                                <!-- Сообщение -->
                                <tr>
                                    <td style="padding: 12px 0 4px 0; font-weight: 600; color: #4A5568; border-bottom: 1px solid #EDF2F7;">
                                        💬 Сообщение
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 10px 0 16px 0; color: #1A202C; background: #F7FAFC; border-radius: 8px; margin-top: 4px; display: block; white-space: pre-wrap; word-wrap: break-word;">
                                        {{ info }}
                                    </td>
                                </tr>

                            </table>
                        </td>
                    </tr>

                    <!-- Футер -->
                    <tr>
                        <td style="padding: 20px 30px; background: #F7FAFC; border-top: 1px solid #EDF2F7; text-align: center;">
                            <p style="margin: 0; font-size: 13px; color: #718096;">
                                🕒 Отправлено: {{ date }}
                            </p>
                            <p style="margin: 6px 0 0 0; font-size: 12px; color: #A0AEC0;">
                                Это автоматическое уведомление с вашего сайта.
                            </p>
                        </td>
                    </tr>

                </table>
                <!-- Конец карточки -->
            </td>
        </tr>
    </table>

</body>
</html>
